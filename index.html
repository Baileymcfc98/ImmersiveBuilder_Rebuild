<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Immersive Lesson Builder — Rebuild</title>

    <!-- ✅ REAL CSS LINK TAG -->
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <!-- ✅ TOP BAR -->
    <header id="top-bar">
        <div class="app-title">Immersive Lesson Builder</div>
        <div id="top-controls"></div>
    </header>

    <!-- ✅ LEFT DOCK -->
    <nav id="left-dock"></nav>

    <!-- ✅ MAIN STAGE -->
    <main id="stage-container">
        <div id="stage">
            <canvas id="draw-layer"></canvas>
        </div>
    </main>

    <!-- ✅ PROPERTIES PANEL -->
    <aside id="properties-panel" class="hidden"></aside>

    <!-- ✅ FLOATING TOOLBAR -->
    <div id="floating-toolbar" class="hidden"></div>

    <!-- ✅ REAL JS MODULE TAG -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
